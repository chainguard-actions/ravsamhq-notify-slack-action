name: Test failure status notification
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          status: failure
          notification_title: "Test Failure Notification"
          notify_when: "failure"
          icon_failure: ":x:"
        env:
          SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/FAKE/FAKE/FAKE"
      - name: Assert action ran with failure status input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action step was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with failure status input provided"
