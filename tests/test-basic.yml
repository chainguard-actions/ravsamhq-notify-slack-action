name: Test basic usage - notify on success
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          status: success
          notification_title: "Test Notification"
          notify_when: "success"
        env:
          SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/FAKE/FAKE/FAKE"
      - name: Assert action was invoked with status input
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action should either succeed or fail gracefully (not skip)
          # A 'skipped' outcome would mean the step was not reached
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action step was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with status input provided"
