name: Test basic usage - success status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          status: success
          notification_title: "Test Notification"
          notify_when: "success"
        env:
          SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/TEST/TEST/TEST"
        continue-on-error: true
      - name: Assert action ran with status input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action ran (even if it failed to reach Slack due to dummy webhook)
          # We verify it was invoked and processed the status input
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with status input covered"
